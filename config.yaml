# ========================================
# OpenAI Bridge 配置
# 修改后重启 Yunzai 生效
# ========================================

# ---- 服务配置 ----

# HTTP 监听端口（被占用时会报错，请改用其他端口）
port: 3000

# 监听地址（0.0.0.0 = 所有网卡，127.0.0.1 = 仅本机）
bindHost: 0.0.0.0

# 是否启用 CORS（跨域请求）
cors: true

# 请求体大小上限（bytes），超过返回 413
maxBodySize: 10485760  # 10MB

# ---- 模型配置 ----

# 模型名称（GET /v1/models 返回的 id）
modelId: yunzai-bot

# 模型显示名称（日志和状态展示用）
modelName: Yunzai-Bot

# ---- 认证配置 ----

# API Key 前缀
# 完整 Key 格式: {keyPrefix}<QQ号>，不要少了后面的-
# 客户端key示例: sk-trss-a7f3e91b4c82d056-12345678
keyPrefix: sk-trss-a7f3e91b4c82d056-

# ---- 超时配置 ----

# 等待 Yunzai 回复超时（毫秒）
# 像角色面板查询等复杂请求可能需要 10-20 秒
replyTimeout: 10000  # 10秒

# ---- 日志配置 ----

# 日志级别: debug / info / warn / error
# debug 会记录每次请求的 prompt 和 QQ 号
logLevel: debug
